services:
  - type: web
    name: smartcopy-ai
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.14.2
      - key: FLASK_ENV
        value: production
      - key: RATELIMIT_STORAGE_URI
        value: memory://
