<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartCopy AI — Sign Up</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      background: linear-gradient(135deg, #F3F5FF 0%, #E8ECFF 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Outfit', sans-serif;
      padding: 20px;
      min-height: 100vh;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .auth-wrap {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      animation: fadeUp 0.4s ease both;
    }

    /* ── Brand ── */
    .auth-brand { display: flex; align-items: center; justify-content: center; gap: 10px; }
    .auth-brand-icon {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, #5B5EF4, #8B5CF6);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 12px rgba(91, 94, 244, 0.3);
    }
    .auth-brand-name { font-size: 20px; font-weight: 700; color: #0C0E22; }
    .auth-brand-tag  { font-size: 11px; font-weight: 700; color: #5B5EF4; background: #EEF2FF; padding: 3px 7px; border-radius: 5px; }

    /* ── Card ── */
    .auth-card {
      background: #fff;
      border-radius: 18px;
      padding: 28px 24px;
      box-shadow: 0 8px 32px rgba(91, 94, 244, 0.1);
      border: 1px solid rgba(91, 94, 244, 0.06);
    }
    .auth-title { font-size: 22px; font-weight: 700; color: #0C0E22; margin-bottom: 6px; letter-spacing: -0.3px; }
    .auth-sub   { font-size: 13px; color: #6B7280; margin-bottom: 16px; }

    /* ── Perks ── */
    .auth-perks {
      display: flex;
      flex-direction: column;
      gap: 7px;
      margin-bottom: 18px;
      padding: 12px 14px;
      background: linear-gradient(135deg, rgba(91,94,244,0.04), rgba(139,92,246,0.04));
      border-radius: 10px;
      border: 1px solid rgba(91,94,244,0.08);
    }
    .auth-perk { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #374151; }
    .auth-perk svg { color: #5B5EF4; flex-shrink: 0; }

    /* ── Messages ── */
    .auth-error {
      background: #FEF2F2; border: 1px solid #FECACA; color: #DC2626;
      padding: 10px 14px; border-radius: 8px; font-size: 13px;
      margin-bottom: 14px; display: none; animation: slideDown 0.3s ease;
    }
    .auth-success {
      background: #F0FDF4; border: 1px solid #BBF7D0; color: #16A34A;
      padding: 10px 14px; border-radius: 8px; font-size: 13px;
      margin-bottom: 14px; display: none; animation: slideDown 0.3s ease;
    }

    /* ── Fields ── */
    .auth-field { margin-bottom: 14px; }
    .auth-label { display: block; font-size: 13px; font-weight: 500; color: #374151; margin-bottom: 6px; }

    .password-wrap { position: relative; }
    .auth-input {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #E5E7EB;
      border-radius: 9px;
      font-size: 14px;
      font-family: 'Outfit', sans-serif;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
      color: #0C0E22;
      background: #FAFBFC;
    }
    .auth-input::placeholder { color: #9CA3AF; }
    .auth-input:focus {
      border-color: #5B5EF4;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(91, 94, 244, 0.1);
    }
    .password-wrap .auth-input { padding-right: 42px; }
    .toggle-pw {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; padding: 4px;
      color: #9CA3AF; display: flex; align-items: center; transition: color 0.2s;
    }
    .toggle-pw:hover { color: #5B5EF4; }

    /* ── Main button ── */
    .auth-btn {
      width: 100%;
      padding: 11px 16px;
      background: linear-gradient(135deg, #5B5EF4, #8B5CF6);
      color: #fff;
      border: none;
      border-radius: 9px;
      font-size: 14px;
      font-weight: 600;
      font-family: 'Outfit', sans-serif;
      cursor: pointer;
      margin-top: 6px;
      transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
      box-shadow: 0 4px 14px rgba(91, 94, 244, 0.3);
      min-height: 44px;
    }
    .auth-btn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(91, 94, 244, 0.38); }
    .auth-btn:active:not(:disabled) { transform: translateY(0); }
    .auth-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    /* ── Divider ── */
    .auth-divider {
      display: flex; align-items: center; gap: 12px;
      margin: 16px 0; color: #9CA3AF; font-size: 12px;
    }
    .auth-divider::before, .auth-divider::after {
      content: ''; flex: 1; height: 1px; background: #E5E7EB;
    }

    /* ── Google button ── */
    .google-btn {
      width: 100%;
      padding: 10px 16px;
      background: #fff;
      color: #374151;
      border: 1.5px solid #E5E7EB;
      border-radius: 9px;
      font-size: 14px;
      font-weight: 500;
      font-family: 'Outfit', sans-serif;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: background 0.2s, border-color 0.2s, box-shadow 0.2s, transform 0.2s;
      min-height: 44px;
    }
    .google-btn:hover {
      background: #F9FAFB; border-color: #D1D5DB;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06); transform: translateY(-1px);
    }
    .google-btn:active { transform: translateY(0); }

    /* ── Footer ── */
    .auth-footer { text-align: center; margin-top: 16px; font-size: 13px; color: #6B7280; }
    .auth-footer a { color: #5B5EF4; text-decoration: none; font-weight: 600; transition: color 0.2s; }
    .auth-footer a:hover { color: #4A4DE6; text-decoration: underline; }

    @media (max-width: 480px) {
      body { padding: 16px; align-items: flex-start; padding-top: 32px; }
      .auth-card { padding: 24px 20px; }
    }
  </style>
</head>
<body>
  <div class="auth-wrap">

    <div class="auth-brand">
      <div class="auth-brand-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" fill="white"/>
        </svg>
      </div>
      <span class="auth-brand-name">SmartCopy</span>
      <span class="auth-brand-tag">AI</span>
    </div>

    <div class="auth-card">
      <h1 class="auth-title">Create your account</h1>
      <p class="auth-sub">Free forever · No credit card needed</p>

      <div class="auth-perks">
        <div class="auth-perk">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
          5 free emails per day
        </div>
        <div class="auth-perk">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
          Cold email + Follow-up + LinkedIn DM
        </div>
        <div class="auth-perk">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
          Full history saved to your account
        </div>
      </div>

      <div class="auth-error"   id="authError"></div>
      <div class="auth-success" id="authSuccess"></div>

      <div class="auth-field">
        <label class="auth-label" for="name">Your Name</label>
        <input class="auth-input" type="text" id="name" placeholder="Alex Johnson" autocomplete="name" />
      </div>
      <div class="auth-field">
        <label class="auth-label" for="email">Email Address</label>
        <input class="auth-input" type="email" id="email" placeholder="you@example.com" autocomplete="email" />
      </div>
      <div class="auth-field">
        <label class="auth-label" for="password">Password <span style="color:#9CA3AF;font-weight:400;font-size:12px">(min 6 chars)</span></label>
        <div class="password-wrap">
          <input class="auth-input" type="password" id="password" placeholder="••••••••" autocomplete="new-password" />
          <button class="toggle-pw" id="togglePw" type="button" aria-label="Toggle password">
            <svg id="eyeShow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
            <svg id="eyeHide" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
              <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/>
              <path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
      </div>

      <button class="auth-btn" id="signupBtn">Create Free Account</button>

      <div class="auth-divider">Or</div>

      <button class="google-btn" id="googleBtn">
        <svg width="18" height="18" viewBox="0 0 48 48">
          <path fill="#FFC107" d="M43.6 20.1H42V20H24v8h11.3C33.7 32.7 29.2 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 7.9 3l5.7-5.7C34.1 6.5 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20c11 0 20-8.9 20-20 0-1.3-.1-2.7-.4-3.9z"/>
          <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.5 16 19 12 24 12c3.1 0 5.8 1.1 7.9 3l5.7-5.7C34.1 6.5 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/>
          <path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2C29.3 35.5 26.8 36 24 36c-5.2 0-9.6-3.3-11.3-8H6.5C9.8 36.5 16.4 44 24 44z"/>
          <path fill="#1976D2" d="M43.6 20.1H42V20H24v8h11.3c-.9 2.4-2.5 4.5-4.6 6l6.2 5.2C36.9 40.3 44 35 44 24c0-1.3-.1-2.7-.4-3.9z"/>
        </svg>
        Continue with Google
      </button>

      <div class="auth-footer">
        Already have an account? <a href="/login">Log in</a>
      </div>
    </div>

  </div>

  <script>
    const signupBtn = document.getElementById('signupBtn');
    const googleBtn = document.getElementById('googleBtn');
    const errorEl   = document.getElementById('authError');
    const successEl = document.getElementById('authSuccess');
    const pwInput   = document.getElementById('password');
    const togglePw  = document.getElementById('togglePw');
    const eyeShow   = document.getElementById('eyeShow');
    const eyeHide   = document.getElementById('eyeHide');

    togglePw.addEventListener('click', () => {
      const isHidden = pwInput.type === 'password';
      pwInput.type          = isHidden ? 'text'  : 'password';
      eyeShow.style.display = isHidden ? 'none'  : 'block';
      eyeHide.style.display = isHidden ? 'block' : 'none';
    });

    function showError(msg) {
      errorEl.textContent     = msg;
      errorEl.style.display   = 'block';
      successEl.style.display = 'none';
    }
    function showSuccess(msg) {
      successEl.textContent   = msg;
      successEl.style.display = 'block';
      errorEl.style.display   = 'none';
    }

    signupBtn.addEventListener('click', async () => {
      const name     = document.getElementById('name').value.trim();
      const email    = document.getElementById('email').value.trim();
      const password = pwInput.value.trim();

      if (!name || !email || !password) { showError('Please fill in all fields.'); return; }
      if (password.length < 6) { showError('Password must be at least 6 characters.'); return; }

      signupBtn.disabled    = true;
      signupBtn.textContent = 'Creating account…';
      errorEl.style.display = 'none';

      try {
        const res  = await fetch('/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password }),
        });
        const data = await res.json();

        if (data.success) {
          window.location.href = data.redirect;
        } else if (res.status === 200) {
          showSuccess('Account created! Check your email to confirm, then log in.');
          signupBtn.disabled    = false;
          signupBtn.textContent = 'Create Free Account';
        } else {
          showError(data.error || 'Signup failed. Please try again.');
          signupBtn.disabled    = false;
          signupBtn.textContent = 'Create Free Account';
        }
      } catch {
        showError('Something went wrong. Please try again.');
        signupBtn.disabled    = false;
        signupBtn.textContent = 'Create Free Account';
      }
    });

    googleBtn.addEventListener('click', () => {
      googleBtn.disabled    = true;
      googleBtn.textContent = 'Redirecting…';
      window.location.href  = '/auth/google';
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') signupBtn.click();
    });
  </script>
</body>
</html>
