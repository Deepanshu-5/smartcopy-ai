<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartCopy AI — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <style>
    body { background: #F3F5FF; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; font-family: 'Outfit', sans-serif; }
    .auth-wrap { width: 100%; max-width: 420px; padding: 24px; }
    .auth-brand { display: flex; align-items: center; gap: 10px; justify-content: center; margin-bottom: 32px; }
    .auth-brand-icon { width: 38px; height: 38px; background: linear-gradient(135deg,#5B5EF4,#8B5CF6); border-radius: 10px; display: flex; align-items: center; justify-content: center; }
    .auth-brand-name { font-size: 20px; font-weight: 700; color: #0C0E22; }
    .auth-brand-tag { font-size: 11px; font-weight: 700; color: #5B5EF4; background: #EEF2FF; padding: 2px 6px; border-radius: 4px; }
    .auth-card { background: #fff; border-radius: 16px; padding: 36px; box-shadow: 0 4px 24px rgba(91,94,244,0.08); }
    .auth-title { font-size: 22px; font-weight: 700; color: #0C0E22; margin: 0 0 4px; }
    .auth-sub { font-size: 13px; color: #6B7280; margin: 0 0 28px; }
    .auth-field { margin-bottom: 16px; }
    .auth-label { display: block; font-size: 13px; font-weight: 500; color: #374151; margin-bottom: 6px; }

    /* Password wrapper with eye icon */
    .password-wrap { position: relative; }
    .auth-input { width: 100%; box-sizing: border-box; padding: 10px 14px; border: 1.5px solid #E5E7EB; border-radius: 8px; font-size: 14px; font-family: 'Outfit', sans-serif; outline: none; transition: border-color 0.2s; color: #0C0E22; }
    .password-wrap .auth-input { padding-right: 42px; }
    .auth-input:focus { border-color: #5B5EF4; }
    .toggle-pw { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; padding: 4px; color: #9CA3AF; display: flex; align-items: center; transition: color 0.2s; }
    .toggle-pw:hover { color: #5B5EF4; }

    .auth-btn { width: 100%; padding: 12px; background: linear-gradient(135deg,#5B5EF4,#8B5CF6); color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; font-family: 'Outfit', sans-serif; cursor: pointer; margin-top: 8px; transition: opacity 0.2s; }
    .auth-btn:hover { opacity: 0.92; }
    .auth-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .auth-error { background: #FEF2F2; border: 1px solid #FECACA; color: #DC2626; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; display: none; }
    .auth-footer { text-align: center; margin-top: 20px; font-size: 13px; color: #6B7280; }
    .auth-footer a { color: #5B5EF4; text-decoration: none; font-weight: 500; }
    .auth-footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="auth-wrap">

    <div class="auth-brand">
      <div class="auth-brand-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" fill="white"/>
        </svg>
      </div>
      <span class="auth-brand-name">SmartCopy</span>
      <span class="auth-brand-tag">AI</span>
    </div>

    <div class="auth-card">
      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-sub">Log in to your SmartCopy AI account</p>

      <div class="auth-error" id="authError"></div>

      <div class="auth-field">
        <label class="auth-label" for="email">Email</label>
        <input class="auth-input" type="email" id="email" placeholder="you@example.com" autocomplete="email" />
      </div>

      <div class="auth-field">
        <label class="auth-label" for="password">Password</label>
        <div class="password-wrap">
          <input class="auth-input" type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
          <button class="toggle-pw" id="togglePw" type="button" aria-label="Show password">
            <!-- Eye icon (shown when password is hidden) -->
            <svg id="eyeShow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <!-- Eye-off icon (shown when password is visible) -->
            <svg id="eyeHide" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
              <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/>
              <path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
      </div>

      <button class="auth-btn" id="loginBtn">Log In</button>

      <div class="auth-footer" style="margin-top:16px;">
        Don't have an account? <a href="/signup">Sign up free</a>
      </div>
    </div>

  </div>

  <script>
    const loginBtn  = document.getElementById('loginBtn');
    const errorEl   = document.getElementById('authError');
    const pwInput   = document.getElementById('password');
    const togglePw  = document.getElementById('togglePw');
    const eyeShow   = document.getElementById('eyeShow');
    const eyeHide   = document.getElementById('eyeHide');

    // ── Show/hide password ──
    togglePw.addEventListener('click', () => {
      const isHidden = pwInput.type === 'password';
      pwInput.type   = isHidden ? 'text' : 'password';
      eyeShow.style.display = isHidden ? 'none'  : 'block';
      eyeHide.style.display = isHidden ? 'block' : 'none';
    });

    // ── Login ──
    function showError(msg) {
      errorEl.textContent   = msg;
      errorEl.style.display = 'block';
    }

    loginBtn.addEventListener('click', async () => {
      const email    = document.getElementById('email').value.trim();
      const password = pwInput.value.trim();

      if (!email || !password) { showError('Please fill in all fields.'); return; }

      loginBtn.disabled    = true;
      loginBtn.textContent = 'Logging in…';
      errorEl.style.display = 'none';

      try {
        const res  = await fetch('/login', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ email, password }),
        });
        const data = await res.json();

        if (data.success) {
          window.location.href = data.redirect;
        } else {
          showError(data.error || 'Login failed.');
          loginBtn.disabled    = false;
          loginBtn.textContent = 'Log In';
        }
      } catch {
        showError('Something went wrong. Please try again.');
        loginBtn.disabled    = false;
        loginBtn.textContent = 'Log In';
      }
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') loginBtn.click();
    });
  </script>
</body>
</html>
