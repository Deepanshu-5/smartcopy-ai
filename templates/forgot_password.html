<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="csrf-token" content="{{ csrf_token() }}">
  <title>SmartCopy AI — Forgot Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <style>
    body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .auth-container { background: white; border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); width: 100%; max-width: 400px; padding: 40px; }
    .auth-header { text-align: center; margin-bottom: 32px; }
    .auth-logo { font-size: 24px; font-weight: 800; color: #667eea; margin-bottom: 16px; }
    .auth-title { font-size: 22px; font-weight: 700; color: #1f2937; margin-bottom: 8px; }
    .auth-subtitle { font-size: 14px; color: #6b7280; }
    .form-group { margin-bottom: 20px; }
    .form-label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 8px; }
    .form-input { width: 100%; padding: 10px 12px; border: 1.5px solid #e5e7eb; border-radius: 8px; font-size: 14px; font-family: 'Outfit', sans-serif; transition: border-color 0.2s; }
    .form-input:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,0.1); }
    .form-button { width: 100%; padding: 12px; background: #667eea; color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
    .form-button:hover { background: #5568d3; }
    .form-button:disabled { background: #cbd5e1; cursor: not-allowed; }
    .form-message { margin-top: 12px; padding: 12px; border-radius: 8px; font-size: 13px; display: none; }
    .form-message.success { background: #d1fae5; color: #065f46; border: 1px solid #6ee7b7; }
    .form-message.error { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
    .auth-link { text-align: center; margin-top: 20px; }
    .auth-link a { color: #667eea; text-decoration: none; font-size: 13px; font-weight: 600; }
    .auth-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-header">
      <div class="auth-logo">✨ SmartCopy AI</div>
      <div class="auth-title">Reset Password</div>
      <div class="auth-subtitle">Enter your email to receive a password reset link</div>
    </div>

    <form id="forgotPasswordForm">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input
          type="email"
          id="resetEmail"
          class="form-input"
          placeholder="you@example.com"
          required
          autocomplete="email"
        />
      </div>
      <button type="submit" class="form-button" id="resetBtn">Send Reset Link</button>
      <div id="resetMsg" class="form-message"></div>
    </form>

    <div class="auth-link">
      Remember your password? <a href="/login">Sign in</a>
    </div>
  </div>

  <script>
    const form = document.getElementById('forgotPasswordForm');
    const btn = document.getElementById('resetBtn');
    const msg = document.getElementById('resetMsg');
    const emailInput = document.getElementById('resetEmail');
    const csrfToken = document.querySelector('meta[name="csrf-token"]')?.content || '';

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = emailInput.value.trim();

      if (!email) {
        showMsg('error', 'Please enter your email address.');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Sending...';
      msg.className = 'form-message';

      try {
        const res = await fetch('/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrfToken },
          body: JSON.stringify({ email }),
        });
        const data = await res.json();

        if (data.success) {
          showMsg('success', 'Check your email for a password reset link.');
          emailInput.value = '';
        } else {
          showMsg('error', data.error || 'Failed to send reset link.');
        }
      } catch (err) {
        console.error(err);
        showMsg('error', 'An error occurred. Please try again.');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Send Reset Link';
      }
    });

    function showMsg(type, text) {
      msg.textContent = text;
      msg.className = `form-message ${type}`;
      msg.style.display = 'block';
      if (type === 'success') {
        setTimeout(() => { msg.style.display = 'none'; }, 3000);
      }
    }
  </script>
</body>
</html>
