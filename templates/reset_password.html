<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="csrf-token" content="{{ csrf_token() }}">
  <title>SmartCopy AI - Set New Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      font-family: Outfit, sans-serif;
      background: #0d051f;
      background-image:
        radial-gradient(circle at 80% 20%, rgba(91,94,244,0.4) 0%, transparent 40%),
        radial-gradient(circle at 10% 80%, rgba(138,43,226,0.3) 0%, transparent 50%);
      color: #fff;
    }
    .auth-wrap { width: 100%; max-width: 420px; display: flex; flex-direction: column; gap: 20px; }
    .auth-brand { display: flex; align-items: center; justify-content: center; gap: 10px; }
    .auth-brand-icon {
      width: 38px; height: 38px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #5B5EF4, #8B5CF6);
      box-shadow: 0 4px 12px rgba(91, 94, 244, 0.3);
    }
    .auth-brand-name { font-size: 20px; font-weight: 700; }
    .auth-brand-tag { font-size: 11px; font-weight: 700; color: #c0c1ff; background: rgba(91,94,244,0.3); padding: 3px 7px; border-radius: 5px; }
    .auth-card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 18px;
      padding: 28px 24px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.4);
    }
    .auth-title { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
    .auth-sub { font-size: 13px; line-height: 1.5; color: rgba(255,255,255,0.62); margin-bottom: 22px; }
    .auth-field { margin-bottom: 14px; }
    .auth-label { display: block; font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.75); margin-bottom: 6px; }
    .auth-input {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid rgba(255,255,255,0.15);
      border-radius: 9px;
      font: inherit;
      font-size: 14px;
      color: #fff;
      background: rgba(255,255,255,0.07);
      outline: none;
    }
    .auth-input:focus {
      border-color: #5B5EF4;
      box-shadow: 0 0 0 3px rgba(91,94,244,0.25);
      background: rgba(255,255,255,0.1);
    }
    .auth-btn {
      width: 100%;
      min-height: 44px;
      margin-top: 6px;
      border: 0;
      border-radius: 9px;
      color: #fff;
      background: linear-gradient(135deg, #5B5EF4, #8B5CF6);
      font: inherit;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(91, 94, 244, 0.3);
    }
    .auth-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .auth-message {
      display: none;
      margin-top: 12px;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.45;
    }
    .auth-message.success { display: block; background: #d1fae5; color: #065f46; border: 1px solid #6ee7b7; }
    .auth-message.error { display: block; background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
    .auth-footer { text-align: center; margin-top: 16px; font-size: 13px; color: rgba(255,255,255,0.5); }
    .auth-footer a { color: #c0c1ff; text-decoration: none; font-weight: 600; }
    .auth-footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-brand">
      <div class="auth-brand-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" fill="white"/>
        </svg>
      </div>
      <span class="auth-brand-name">SmartCopy</span>
      <span class="auth-brand-tag">AI</span>
    </div>

    <div class="auth-card">
      <h1 class="auth-title">Set a new password</h1>
      <p class="auth-sub">
        {% if reset_ready %}
          Choose a strong password to regain access to your account.
        {% else %}
          This reset link is missing or expired. Request a new password reset link.
        {% endif %}
      </p>

      <div class="auth-field">
        <label class="auth-label" for="password">New Password</label>
        <input class="auth-input" type="password" id="password" autocomplete="new-password" {% if not reset_ready %}disabled{% endif %} />
      </div>
      <div class="auth-field">
        <label class="auth-label" for="confirmPassword">Confirm Password</label>
        <input class="auth-input" type="password" id="confirmPassword" autocomplete="new-password" {% if not reset_ready %}disabled{% endif %} />
      </div>

      <button class="auth-btn" id="resetBtn" {% if not reset_ready %}disabled{% endif %}>Update Password</button>
      <div class="auth-message" id="resetMsg"></div>

      <div class="auth-footer">
        Need a new link? <a href="/forgot-password">Request reset</a>
      </div>
    </div>
  </div>

  <script>
    const resetReady = {{ 'true' if reset_ready else 'false' }};
    const csrfToken = document.querySelector('meta[name="csrf-token"]')?.content || '';
    const resetBtn = document.getElementById('resetBtn');
    const msg = document.getElementById('resetMsg');
    const pw1 = document.getElementById('password');
    const pw2 = document.getElementById('confirmPassword');

    function showMsg(type, text) {
      msg.textContent = text;
      msg.className = `auth-message ${type}`;
    }

    resetBtn.addEventListener('click', async () => {
      if (!resetReady) return;
      const password = pw1.value.trim();
      const confirm = pw2.value.trim();
      if (!password || !confirm) { showMsg('error', 'Please fill in both password fields.'); return; }
      if (password !== confirm) { showMsg('error', 'Passwords do not match.'); return; }
      if (password.length < 8) { showMsg('error', 'Password must be at least 8 characters.'); return; }
      if (!/[A-Z]/.test(password) || !/[0-9]/.test(password)) {
        showMsg('error', 'Password must contain uppercase letter and number.');
        return;
      }

      resetBtn.disabled = true;
      resetBtn.textContent = 'Updating...';

      try {
        const res = await fetch('/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrfToken },
          body: JSON.stringify({ password }),
        });
        const data = await res.json();
        if (data.success) {
          showMsg('success', 'Password updated. Redirecting to login...');
          window.setTimeout(() => { window.location.href = data.redirect || '/login'; }, 900);
        } else {
          showMsg('error', data.error || 'Password reset failed.');
          resetBtn.disabled = false;
          resetBtn.textContent = 'Update Password';
        }
      } catch {
        showMsg('error', 'Something went wrong. Please try again.');
        resetBtn.disabled = false;
        resetBtn.textContent = 'Update Password';
      }
    });
  </script>
</body>
</html>
